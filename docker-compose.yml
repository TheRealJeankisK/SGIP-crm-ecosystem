version: '3.8'

services:
  # --- CAPA DE DATOS: MySQL Database ---
  db:
    image: mysql:8.0
    container_name: insecom_mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- CAPA DE DATOS: Redis Cache ---
  cache:
    image: redis:7-alpine
    container_name: insecom_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # --- QUEUE MANAGER: RabbitMQ ---
  queue:
    image: rabbitmq:3-management-alpine
    container_name: insecom_queue
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- APP 1: Frontend App ---
  frontend:
    image: nginx:alpine
    container_name: insecom_frontend
    restart: always
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "8081:80"

  # --- APP 2: Core Leads Service (Backend API) ---
  leads-service:
    build:
      context: ./leads-service
    container_name: insecom_leads_api
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      queue:
        condition: service_healthy

  # --- APP 3: Notification Lambda (Serverless Simulator) ---
  notification-lambda:
    build:
      context: ./notification-lambda
    container_name: insecom_notification_lambda
    restart: always
    env_file:
      - .env
    depends_on:
      queue:
        condition: service_healthy
      cache:
        condition: service_started

  # --- API GATEWAY: Nginx Reverse Proxy ---
  api-gateway:
    image: nginx:alpine
    container_name: insecom_gateway
    restart: always
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - leads-service

volumes:
  mysql_data:
  redis_data:
